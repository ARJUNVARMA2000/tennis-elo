name: refresh

# Three triggers on one workflow:
#   * 06:00 UTC daily -> FULL: download everything, retrain both tours, rebuild all JSON.
#   * hourly at :17   -> QUICK: re-pull ESPN live results and regenerate JSON from the
#     saved model (no retrain, ~1-2 min). The data cache carries the historical archive
#     and the trained predictor.pkl + accuracy.json between runs. (:17 dodges the
#     top-of-hour Actions scheduling congestion; the 06:00 hour belongs to the full run.)
#   * push to master  -> QUICK: redeploy the site immediately with the cached data/model.
on:
  push:
    branches: [master]
  schedule:
    - cron: "0 6 * * *"            # daily FULL retrain
    - cron: "17 0-5,7-23 * * *"    # hourly QUICK refresh (skips the 06:00 full slot)
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        type: choice
        options: [auto, full, quick]
        default: auto

permissions:
  contents: write      # commit the append-only forecast log back to the repo
  issues: write        # open/comment/close the data-health issue on a failed health check

# The public site URL, in one place: the build (metadataBase -> og:image), the
# deployment environment link, and the health issue's status-page link all derive from
# it. Moving hosts again means changing this line, not hunting hardcoded URLs.
env:
  SITE_URL: https://deuce-forecast.web.app

# Serialize deploys but NEVER cancel one mid-flight: a scheduled refresh or a
# concurrent push used to cancel the in-progress deploy carrying a change (cancel-in-progress:
# true), so the change silently never shipped and the run had to be re-dispatched by hand.
# false = the in-progress run finishes; GitHub queues only the latest superseding run and
# skips the intermediate ones.
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ env.SITE_URL }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Install Python deps
        run: pip install -r tennis_model/requirements.txt

      # Carries data/raw (historical archive) + data/output (predictor.pkl, accuracy.json,
      # JSON) across runs so quick runs have a model to refresh from. A new cache is saved
      # each run (unique key) and the most recent is restored (restore-keys prefix).
      - name: Restore data cache
        uses: actions/cache@v6
        with:
          path: tennis_model/data
          key: tennis-data-${{ github.run_id }}
          restore-keys: tennis-data-

      # If the cache was evicted, bootstrap the immutable archive from the release
      # snapshot instead of hammering (increasingly disappearing) upstreams.
      - name: Bootstrap from release snapshot (cache miss only)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # the WTA stats backfill (2024+) only exists in the snapshot — a cache that
          # predates it must also trigger the restore
          if [ ! -f tennis_model/data/raw/atp/historical/2020.csv ] \
             || [ ! -f tennis_model/data/raw/wta/stats/2024.csv ]; then
            echo "cache empty/incomplete -> restoring from release asset"
            gh release download data-archive --pattern 'raw-archive.tar.gz' -O /tmp/raw-archive.tar.gz \
              && tar -xzf /tmp/raw-archive.tar.gz -C tennis_model/data \
              || echo "::warning::no release snapshot available yet"
          fi

      - name: Decide mode
        id: mode
        run: |
          MODE=quick
          if [ "${{ github.event_name }}" = "schedule" ] && [ "${{ github.event.schedule }}" = "0 6 * * *" ]; then MODE=full; fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.mode }}" != "auto" ]; then MODE="${{ github.event.inputs.mode }}"; fi
          # No saved model to refresh from yet (e.g. first run / evicted cache) -> do a full build.
          if [ "$MODE" = "quick" ] && [ ! -f tennis_model/data/output/atp/predictor.pkl ]; then MODE=full; fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "Selected mode: $MODE"

      - name: Full refresh (download all + retrain both tours)
        if: steps.mode.outputs.mode == 'full'
        working-directory: tennis_model
        env:
          PYTHONPATH: src
        run: |
          python -m tennis_model.data.download --kind all --strict
          python -m tennis_model.data.odds --tour all || true
          python -m tennis_model.pipeline --tour all --backtest

      - name: Quick refresh (live results + regenerate from saved model)
        if: steps.mode.outputs.mode == 'quick'
        working-directory: tennis_model
        env:
          PYTHONPATH: src
        run: python -m tennis_model.pipeline --tour all --quick

      # Pre-deploy integrity gate (BOTH modes). Blocks the deploy on any internally-
      # inconsistent produced JSON — impossible reach odds, aliveCount>drawSize, a live event
      # already naming a champion, a non-standard-size "real" draw, placeholder-name leaks,
      # missing/corrupt required JSON. Source-freshness problems are NOT gated here (those
      # still deploy best-effort and are reported by the post-deploy sentinel). On failure the
      # job stops before build/deploy, so the last good deploy stays live rather than shipping
      # a wrong one. This is why quick runs (live-draw pairings) are covered too, not just full.
      - name: Pre-deploy integrity gate
        working-directory: tennis_model
        env:
          PYTHONPATH: src
        run: python -m tennis_model.data.health --gate

      # Durably persist the append-only forecast log (the data cache is evictable, so
      # commit it back). Once daily on the full run keeps history to one commit/day; the
      # cache carries the hourly quick-run appends in between. continue-on-error: deploy
      # and the health sentinel must still run on a push failure — the trailing
      # "Fail if forecast-log push failed" step reds the run AFTER them, so a persistent
      # failure alerts (red run + owner email) instead of warning into the void. The
      # rebase-retry loop tolerates concurrent pushers racing this commit. The bot's own
      # push can't re-trigger this workflow (GITHUB_TOKEN events never spawn new runs).
      - name: Persist forecast log
        id: persist
        if: steps.mode.outputs.mode == 'full'
        continue-on-error: true
        working-directory: tennis_model
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/forecast_log data/kalshi_ledger 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no forecast-log changes to commit"
            exit 0
          fi
          git commit -m "chore(eval-logs): daily forecast log + kalshi ledger update"
          for i in 1 2 3; do
            git push && exit 0
            echo "push attempt $i failed — rebasing onto latest ${GITHUB_REF_NAME}"
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
            sleep $((10 * i))
          done
          git push && exit 0
          echo "::error::forecast-log push failed after 4 attempts — eval history exists only in the evictable cache"
          exit 1

      # Health sentinel WRITE pass, before the site build: reads the finalized pipeline
      # outputs (nothing below changes them), always exits 0, writes health.json and
      # mirrors it to web/public/data/ so THIS deploy ships its own current report — the
      # (hidden) /health page renders it. Runs on EVERY mode (a source that dies right
      # after the daily full run used to feed ~23 stale hourly deploys before the next
      # check noticed). The ALERTING on this report stays post-deploy ("Report data
      # health", last) so it can never cost a deploy.
      - name: Data health check
        working-directory: tennis_model
        env:
          PYTHONPATH: src
        run: python -m tennis_model.data.health

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # No NEXT_PUBLIC_BASE_PATH: Firebase serves the site at the domain ROOT, so the
      # basePath stays unset (the plumbing in next.config.ts defaults to "" and is kept
      # for portability). NEXT_PUBLIC_SITE_URL feeds metadataBase -> absolute og:image.
      - name: Build static site
        working-directory: web
        env:
          NEXT_PUBLIC_SITE_URL: ${{ env.SITE_URL }}
        run: |
          npm ci
          npm run build

      # Deploys web/out per the repo-root firebase.json. channelId: live = the production
      # channel (omitting it would create a throwaway preview channel instead).
      # firebase.json's cache headers are load-bearing, not tuning: Firebase defaults to a
      # 1-hour browser cache, which would serve this hourly-refreshed site's odds stale.
      # It is strict JSON (firebase-tools JSON.parse's it) so the why lives in
      # tasks/lessons.md — read that before touching the headers block.
      - name: Deploy to Firebase Hosting
        id: deploy
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: deuce-forecast
          channelId: live

      # Post-deploy verification of the LIVE site — the serving-side analogue of the
      # pre-deploy data-health gate, which only sees local JSON and never Firebase's CDN.
      # Asserts routes / cache headers / MIME / trailingSlash / 404 and, crucially, that the
      # live health.json carries the generatedAt we just built (catches "deploy reported
      # success but the CDN is still serving old content"). continue-on-error: a failure
      # must still flow to "Report deploy health" below, never abort the job before the
      # cache saves. FRESH_TRIES is widened to absorb CDN propagation lag before calling a
      # freshly-shipped deploy stale (the one detail that would otherwise flake every run).
      - name: Verify live Firebase deploy
        id: verifydeploy
        continue-on-error: true
        working-directory: web
        env:
          VERIFY_BASE_URL: ${{ env.SITE_URL }}
          FRESH_TRIES: "18"
        run: |
          EXPECT=$(python -c "import json; print(json.load(open('out/data/health.json'))['generatedAt'])")
          echo "expecting live generatedAt=$EXPECT"
          EXPECT_GENERATED_AT="$EXPECT" node scripts/verify-deploy.mjs 2>&1 | tee /tmp/verify-deploy.log

      # Weekly (Mondays, or whenever the release is missing) snapshot of the raw data
      # to a rolling release asset — upstream disappearance can then never break a
      # bootstrap. Runs after deploy: a snapshot hiccup must not block the site.
      - name: Snapshot raw data to release
        if: steps.mode.outputs.mode == 'full'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view data-archive >/dev/null 2>&1; then
            gh release create data-archive --title "Rolling raw-data archive" \
              --notes "Automated snapshot of raw match data (historical archives are no longer downloadable upstream)." \
              --latest=false
            FORCE=1
          fi
          if [ "$(date -u +%u)" = "1" ] || [ -n "$FORCE" ]; then
            cd tennis_model/data
            DIRS=""
            for d in raw/atp/historical raw/atp/stats raw/wta/historical raw/wta/stats raw/charting raw/odds raw/kalshi; do
              [ -d "$d" ] && DIRS="$DIRS $d"
            done
            tar -czf /tmp/raw-archive.tar.gz $DIRS
            gh release upload data-archive /tmp/raw-archive.tar.gz --clobber
            echo "snapshot uploaded ($(du -h /tmp/raw-archive.tar.gz | cut -f1))"
          else
            echo "not Monday - skipping snapshot"
          fi

      # Turn the health.json written by the pre-build check into an actionable alert
      # AFTER the deploy (an alert must never cost a deploy): file (or comment on) a single
      # `data-health` GitHub issue carrying the specific problems + a ready-to-paste fix
      # prompt, auto-close it on recovery, and red the run so GitHub also emails the owner.
      # Runs on EVERY mode, dedup'd so a standing failure alerts once, not 24x/day:
      #   * recovery        -> close the issue (any mode; now within the hour)
      #   * no open issue   -> create + red (any mode; one email at onset)
      #   * issue standing  -> full run: comment + red (the daily heartbeat, as before);
      #                        quick run: comment only if the problem set changed, then
      #                        stay GREEN (the open issue IS the alert)
      # Quick runs must exit 0 while the issue stands: a red job never saves the data
      # cache, so the prev health.json feeding problems_changed would stay stale and
      # every hourly run would re-red — the storm this dedup exists to prevent. The
      # "does an issue exist" bit lives in GitHub, immune to cache loss.
      # A GITHUB_TOKEN-authenticated issue write can't re-trigger this workflow, so no loop.
      - name: Report data health
        working-directory: tennis_model
        env:
          PYTHONPATH: src
          GH_TOKEN: ${{ github.token }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          # Read straight from SITE_URL rather than the deploy step's output: this step
          # must still produce a working status link on the paths where the deploy was
          # skipped or failed — which is exactly when the health report matters most.
          HEALTH_PAGE_URL: ${{ env.SITE_URL }}/health/
          MODE: ${{ steps.mode.outputs.mode }}
        run: |
          OK=$(python -c "import json; print(json.load(open('data/output/health.json'))['ok'])")
          CHANGED=$(python -c "import json; print(json.load(open('data/output/health.json')).get('problems_changed', True))")
          gh label create data-health --color B60205 \
            --description "Pipeline data-health failures" 2>/dev/null || true
          EXISTING=$(gh issue list --label data-health --state open --json number --jq '.[0].number // empty')
          if [ "$OK" = "True" ]; then
            if [ -n "$EXISTING" ]; then
              gh issue comment "$EXISTING" \
                --body "✅ Recovered: the data-health check passed on $(date -u +%F). Closing." || true
              gh issue close "$EXISTING" || true
            fi
            echo "data health OK"
            exit 0
          fi
          python -m tennis_model.data.health --issue-body > /tmp/health-body.md
          if [ -z "$EXISTING" ]; then
            gh issue create --label data-health \
              --title "Data-health check failed" --body-file /tmp/health-body.md
            echo "::error::data-health check failed — see the data-health issue"
            exit 1
          fi
          if [ "$MODE" = "full" ] || [ "$CHANGED" = "True" ]; then
            gh issue comment "$EXISTING" --body-file /tmp/health-body.md
            echo "commented on existing data-health issue #$EXISTING"
          fi
          if [ "$MODE" = "full" ]; then
            echo "::error::data-health check failed — see the data-health issue"
            exit 1
          fi
          echo "::warning::data-health still failing — see the open data-health issue #$EXISTING"
          exit 0

      # Turn the post-deploy verification into an actionable alert. The branch logic
      # (dedup, mode throttling, and the skipped-vs-failed distinction) lives in
      # .github/scripts/report-deploy-health.sh so it is directly testable — see
      # tennis_model/tests/test_workflow_alerts.py. if: always() so it runs even when an
      # earlier alert step redded, and so a never-ran verification is seen and no-op'd.
      - name: Report deploy health
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          OUTCOME: ${{ steps.verifydeploy.outcome }}
          MODE: ${{ steps.mode.outputs.mode }}
          SITE_URL: ${{ env.SITE_URL }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: bash .github/scripts/report-deploy-health.sh

      # Escalation for the best-effort persist step above: red the run only AFTER
      # deploy + sentinel have had their chance, so a failing push alerts without
      # ever costing a deploy or a health report.
      - name: Fail if forecast-log push failed
        if: steps.mode.outputs.mode == 'full' && steps.persist.outcome == 'failure'
        run: |
          echo "::error::forecast-log push failed after retries (see the Persist forecast log step)"
          exit 1
