name: daily-refresh

# Pull fresh results, retrain both tours, regenerate JSON, build + deploy the site.
on:
  schedule:
    - cron: "0 6 * * *" # every day 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python deps
        run: pip install -r tennis_model/requirements.txt

      - name: Download data (historical + fresh + charting)
        working-directory: tennis_model
        env:
          PYTHONPATH: src
        run: python -m tennis_model.data.download --kind all

      - name: Build models + JSON (both tours)
        working-directory: tennis_model
        env:
          PYTHONPATH: src
        run: python -m tennis_model.pipeline --tour all --backtest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build static site
        working-directory: web
        env:
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
        run: |
          npm ci
          npm run build

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/out
      - id: deploy
        uses: actions/deploy-pages@v4
