name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tennis_model/requirements.txt

      - name: Install dependencies
        run: pip install -r tennis_model/requirements.txt

      - name: Lint
        run: pip install ruff && ruff check .

      - name: Run tests
        run: pytest tennis_model/tests -q

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      # catches type errors and export breakage on PRs before the deploy
      # workflow hits them (Next 16 no longer lints during build). No basePath, matching
      # the root-domain Firebase build that refresh.yml ships.
      - name: Build (type-check + static export)
        run: npm run build
