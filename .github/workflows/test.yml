name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tennis_model/requirements.txt

      - name: Install dependencies
        run: pip install -r tennis_model/requirements.txt

      - name: Lint
        run: pip install ruff && ruff check .

      - name: Run tests
        run: pytest tennis_model/tests -q
